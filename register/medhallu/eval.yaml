title: "MedHallu"
description: |
  Evaluates LLM ability to detect hallucinations in medical question-answering.
  Each sample presents a PubMed-derived knowledge passage, a biomedical question,
  and a candidate answer; the model must classify the answer as factual or
  hallucinated. Dataset rows are doubled — one sample with the ground-truth answer
  (label: factual) and one with the hallucinated answer (label: hallucinated) —
  yielding binary classification accuracy as the primary metric. Results are
  stratified by difficulty tier (easy / medium / hard) stored in sample metadata.
arxiv: "https://arxiv.org/abs/2408.08511"
contributors:
  - nath-netizen
tags:
  - Medical
  - Hallucination
tasks:
  - name: medhallu
    task_path: src/medhallu/medhallu.py
source:
